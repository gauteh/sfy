name: sfy4-buoy

on:
  push:
    branches: [ main ]
    tags:
      - "v*.*"

  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04

    steps:
      - name: Install deps
        run: |
          apt-get -y update
          apt-get -y install build-essential libssl-dev gcc-arm-none-eabi binutils-arm-none-eabi libclang-dev clang curl git

      - name: Work around git permission issue
        run: git config --global --add safe.directory /__w/sfy/sfy

      - uses: actions/checkout@v2
      - name: Install latest nightly
        uses: actions-rs/toolchain@v1
        with:
            toolchain: nightly
            override: true

      - name: Add rust target for thumbv7em
        run: |
          rustup default nightly
          rustup component add rust-src llvm-tools-preview rustc-dev
          rustup target add thumbv7em-none-eabihf

      - name: Build (buoy)
        working-directory: sfy4-buoy/sfy4-main
        run: cargo build --verbose --release

      - name: Test (host-tests)
        working-directory: sfy4-buoy/
        run: make host-test

      - name: Build (target tests)
        working-directory: sfy4-buoy/target-test
        run: cargo build --verbose --tests

      - name: Build firmware (default, continuous GPS)
        working-directory: sfy4-buoy/
        run: |
          mkdir -p target/bins
          SYNC_PERIOD=20 make T=r bin
          mv target/sfy4-main.bin target/bins/sfy4-continuous-gps-no-storage.bin

          SYNC_PERIOD=20 CARGO_FLAGS="--features storage" make T=r bin
          mv target/sfy4-main.bin target/bins/sfy4-continuous-gps-with-storage.bin

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: sfy4-buoy/target/bins

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: |
            sfy4-buoy/target/bins/*.bin
